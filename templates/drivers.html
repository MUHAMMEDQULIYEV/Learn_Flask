<!DOCTYPE html>
<html>
<head>
    <title>F1 Drivers</title>
</head>
<body>
    <h1>F1 Drivers</h1>

    <table border="1">
        <tr>
            <th>Number</th>
            <th>Name</th>
            <th>Team</th>
        </tr>
        {% for number, driver in drivers.items() %}
        <tr>
            <td>{{ number }}</td>
            <td>{{ driver.name }}</td>
            <td>{{ driver.team }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
